<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="300" fill="#f5f5f5"/>

  <!-- Head -->
  <circle cx="100" cy="85" r="38" fill="#ffffff" stroke="#000000" stroke-width="3"/>

  <!-- Too-perfect hair (slightly unnatural) -->
  <path d="M 65 55 Q 60 30 100 20 Q 140 30 135 55" fill="#1a1a1a" stroke="#000000" stroke-width="2.5"/>
  <ellipse cx="75" cy="45" rx="8" ry="12" fill="#1a1a1a" stroke="#000000" stroke-width="1.5"/>
  <ellipse cx="125" cy="48" rx="8" ry="12" fill="#1a1a1a" stroke="#000000" stroke-width="1.5"/>

  <!-- Hair shine lines (unnatural) -->
  <line x1="85" y1="35" x2="90" y2="25" stroke="#ffffff" stroke-width="2"/>
  <line x1="110" y1="32" x2="115" y2="22" stroke="#ffffff" stroke-width="2"/>

  <!-- Wild excited eyes -->
  <circle cx="85" cy="80" r="8" fill="#000000" stroke="#000000" stroke-width="2"/>
  <circle cx="87" cy="78" r="3" fill="#ffffff"/>
  <circle cx="115" cy="80" r="8" fill="#000000" stroke="#000000" stroke-width="2"/>
  <circle cx="117" cy="78" r="3" fill="#ffffff"/>

  <!-- Eyebrows wild and high -->
  <path d="M 75 70 Q 85 65 95 70" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  <path d="M 105 70 Q 115 65 125 70" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"/>

  <!-- Excited mouth -->
  <path d="M 90 95 Q 100 105 110 95" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Black leather jacket -->
  <path d="M 60 120 L 55 200 Q 55 220 70 230 L 130 230 Q 145 220 145 200 L 140 120 Z" fill="#1a1a1a" stroke="#000000" stroke-width="3"/>

  <!-- Jacket lapels -->
  <path d="M 80 120 L 70 180" fill="none" stroke="#000000" stroke-width="2"/>
  <path d="M 120 120 L 130 180" fill="none" stroke="#000000" stroke-width="2"/>

  <!-- X symbol on jacket (faded blue bird crossed out) -->
  <g transform="translate(100, 160)">
    <!-- Faded blue bird silhouette -->
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#1DA1F2" opacity="0.3" stroke="#1DA1F2" stroke-width="1"/>
    <path d="M -8 -2 L -12 -4" fill="none" stroke="#1DA1F2" stroke-width="1" opacity="0.3"/>
    <path d="M 8 -2 L 12 -4" fill="none" stroke="#1DA1F2" stroke-width="1" opacity="0.3"/>

    <!-- Large red X crossing it out -->
    <line x1="-18" y1="-12" x2="18" y2="12" stroke="#FF0000" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="-12" x2="-18" y2="12" stroke="#FF0000" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Flight suit visible under jacket -->
  <rect x="70" y="140" width="60" height="80" fill="#2a2a2a" stroke="#000000" stroke-width="2"/>

  <!-- Jacket zippers/details -->
  <circle cx="100" cy="135" r="3" fill="#000000"/>
  <circle cx="100" cy="145" r="3" fill="#000000"/>

  <!-- Left arm holding phone 1 -->
  <ellipse cx="40" cy="140" rx="12" ry="40" fill="#1a1a1a" stroke="#000000" stroke-width="2.5" transform="rotate(-25 40 140)"/>

  <!-- Phone 1 - left -->
  <rect x="20" y="80" width="20" height="35" fill="#000000" stroke="#000000" stroke-width="2" rx="2"/>
  <rect x="22" y="82" width="16" height="28" fill="#1DA1F2" stroke="#000000" stroke-width="1"/>
  <text x="30" y="105" font-size="8" fill="#000000" text-anchor="middle">📱</text>

  <!-- Right arm holding phone 2 -->
  <ellipse cx="160" cy="140" rx="12" ry="40" fill="#1a1a1a" stroke="#000000" stroke-width="2.5" transform="rotate(25 160 140)"/>

  <!-- Phone 2 - right -->
  <rect x="160" y="85" width="20" height="35" fill="#000000" stroke="#000000" stroke-width="2" rx="2"/>
  <rect x="162" y="87" width="16" height="28" fill="#1DA1F2" stroke="#000000" stroke-width="1"/>

  <!-- Middle arm/hand holding phone 3 -->
  <ellipse cx="100" cy="155" rx="10" ry="30" fill="#1a1a1a" stroke="#000000" stroke-width="2.5"/>

  <!-- Phone 3 - middle, slightly raised -->
  <rect x="85" y="105" width="20" height="35" fill="#000000" stroke="#000000" stroke-width="2" rx="2"/>
  <rect x="87" y="107" width="16" height="28" fill="#1DA1F2" stroke="#000000" stroke-width="1"/>

  <!-- Muskrat/ferret on shoulder -->
  <g transform="translate(145, 110)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#8B4513" stroke="#000000" stroke-width="2"/>
    <!-- Head -->
    <circle cx="14" cy="-2" r="8" fill="#8B4513" stroke="#000000" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="18" cy="-5" r="3" fill="#000000"/>
    <circle cx="18" cy="1" r="3" fill="#000000"/>
    <!-- Nose -->
    <circle cx="22" cy="-2" r="2" fill="#000000"/>
    <!-- Tail -->
    <path d="M -12 5 Q -20 10 -18 20" fill="none" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
    <!-- Paws -->
    <circle cx="-5" cy="8" r="3" fill="#8B4513" stroke="#000000" stroke-width="1"/>
    <circle cx="5" cy="8" r="3" fill="#8B4513" stroke="#000000" stroke-width="1"/>
  </g>

  <!-- Legs -->
  <rect x="80" y="220" width="14" height="60" fill="#1a1a1a" stroke="#000000" stroke-width="2"/>
  <rect x="106" y="220" width="14" height="60" fill="#1a1a1a" stroke="#000000" stroke-width="2"/>

  <!-- Shoes -->
  <ellipse cx="87" cy="285" rx="12" ry="10" fill="#000000" stroke="#000000" stroke-width="2"/>
  <ellipse cx="113" cy="285" rx="12" ry="10" fill="#000000" stroke="#000000" stroke-width="2"/>

  <!-- Shoe details (expensive looking) -->
  <rect x="78" y="280" width="18" height="3" fill="#ffffff" stroke="none"/>
  <rect x="104" y="280" width="18" height="3" fill="#ffffff" stroke="none"/>
</svg>