<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frostGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003087;stop-opacity:1" />
    </linearGradient>
    <filter id="frostGlow">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>
  </defs>

  <!-- Icicles hanging from arms -->
  <g filter="url(#frostGlow)" opacity="0.9">
    <polygon points="55,160 50,210 60,210" fill="#B3E5FC" stroke="#80DEEA" stroke-width="1"/>
    <polygon points="145,160 140,215 150,215" fill="#B3E5FC" stroke="#80DEEA" stroke-width="1"/>
    <polygon points="48,180 43,225 53,225" fill="#A8D8EA" stroke="#4FC3F7" stroke-width="0.5"/>
    <polygon points="152,180 147,228 157,228" fill="#A8D8EA" stroke="#4FC3F7" stroke-width="0.5"/>
  </g>

  <!-- Frozen coins at feet -->
  <circle cx="60" cy="270" r="6" fill="#FFD700" opacity="0.7" stroke="#003087" stroke-width="1"/>
  <circle cx="80" cy="275" r="5" fill="#FFC107" opacity="0.7" stroke="#003087" stroke-width="1"/>
  <circle cx="140" cy="272" r="6" fill="#FFD700" opacity="0.7" stroke="#003087" stroke-width="1"/>
  <circle cx="120" cy="278" r="5" fill="#FFC107" opacity="0.7" stroke="#003087" stroke-width="1"/>

  <!-- Body - Banker's suit -->
  <ellipse cx="100" cy="140" rx="45" ry="55" fill="url(#frostGradient)" stroke="#001a4d" stroke-width="2"/>

  <!-- Suit jacket lapels with ice crystals -->
  <polygon points="75,120 85,145 70,145" fill="#003087" stroke="#001a4d" stroke-width="1.5"/>
  <polygon points="125,120 115,145 130,145" fill="#003087" stroke="#001a4d" stroke-width="1.5"/>

  <!-- Ice crystals on shoulders -->
  <g fill="#E0F4FF" stroke="#80DEEA" stroke-width="0.5">
    <polygon points="60,110 65,105 63,115"/>
    <polygon points="65,100 72,95 70,110"/>
    <polygon points="140,110 135,105 137,115"/>
    <polygon points="135,100 128,95 130,110"/>
  </g>

  <!-- Tie -->
  <polygon points="95,130 105,130 100,160" fill="#4FC3F7" stroke="#0277BD" stroke-width="1"/>

  <!-- Neck -->
  <ellipse cx="100" cy="105" rx="15" ry="18" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1"/>

  <!-- Head -->
  <circle cx="100" cy="75" r="30" fill="#F5DEB3" stroke="#D2B48C" stroke-width="2"/>

  <!-- Ice-blue glasses -->
  <g stroke="#0277BD" stroke-width="2" fill="#B3E5FC" opacity="0.8">
    <circle cx="85" cy="72" r="10"/>
    <circle cx="115" cy="72" r="10"/>
    <line x1="95" y1="72" x2="105" y2="72"/>
  </g>

  <!-- Cold, stern expression -->
  <ellipse cx="85" cy="75" rx="3" ry="4" fill="#000"/>
  <ellipse cx="115" cy="75" rx="3" ry="4" fill="#000"/>
  <path d="M 95 85 Q 100 83 105 85" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Hair/head detail - frosty top -->
  <polygon points="70,50 100,40 130,50 125,60 75,60" fill="#003087" stroke="#001a4d" stroke-width="1.5"/>

  <!-- Left arm raised in STOP gesture -->
  <ellipse cx="55" cy="120" rx="12" ry="35" fill="#E0F4FF" stroke="#0277BD" stroke-width="1.5"/>
  <circle cx="50" cy="85" r="14" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>
  <!-- STOP hand -->
  <g transform="translate(50, 85)">
    <ellipse rx="14" ry="18" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>
    <line x1="-5" y1="-8" x2="-5" y2="8" stroke="#D2B48C" stroke-width="1"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#D2B48C" stroke-width="1"/>
    <line x1="5" y1="-8" x2="5" y2="8" stroke="#D2B48C" stroke-width="1"/>
  </g>

  <!-- Right arm -->
  <ellipse cx="145" cy="130" rx="12" ry="40" fill="#E0F4FF" stroke="#0277BD" stroke-width="1.5"/>
  <circle cx="150" cy="170" r="13" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>

  <!-- Frozen gavel at belt -->
  <g transform="translate(100, 175)">
    <rect x="-8" y="0" width="16" height="12" fill="#8B7355" stroke="#654321" stroke-width="1"/>
    <line x1="-10" y1="12" x2="10" y2="12" stroke="#B0E0E6" stroke-width="3"/>
    <ellipse cx="0" cy="14" rx="12" ry="3" fill="#80DEEA" stroke="#0277BD" stroke-width="1"/>
  </g>

  <!-- Pants -->
  <rect x="80" y="175" width="18" height="35" fill="#001a4d" stroke="#000080" stroke-width="1.5"/>
  <rect x="102" y="175" width="18" height="35" fill="#001a4d" stroke="#000080" stroke-width="1.5"/>

  <!-- Shoes -->
  <ellipse cx="89" cy="215" rx="10" ry="7" fill="#000" stroke="#333" stroke-width="1"/>
  <ellipse cx="111" cy="215" rx="10" ry="7" fill="#000" stroke="#333" stroke-width="1"/>
</svg>