<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="300" fill="#E6F0FF"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="280" rx="50" ry="10" fill="#00000025"/>

  <!-- Wizard robe (blue) with four-pane window pattern -->
  <ellipse cx="100" cy="190" rx="45" ry="65" fill="#00A4EF" stroke="#333333" stroke-width="2.5"/>

  <!-- Robe four-pane window pattern -->
  <g id="window-pattern" stroke="#4A90E2" stroke-width="2" opacity="0.4">
    <!-- Top left pane -->
    <rect x="75" y="140" width="18" height="20" fill="none"/>
    <!-- Top right pane -->
    <rect x="107" y="140" width="18" height="20" fill="none"/>
    <!-- Bottom left pane -->
    <rect x="75" y="165" width="18" height="20" fill="none"/>
    <!-- Bottom right pane -->
    <rect x="107" y="165" width="18" height="20" fill="none"/>
    <!-- Window dividers -->
    <line x1="93" y1="140" x2="93" y2="185" stroke="#4A90E2" stroke-width="1.5"/>
    <line x1="75" y1="152.5" x2="125" y2="152.5" stroke="#4A90E2" stroke-width="1.5"/>
  </g>

  <!-- Blue button-down shirt visible under vest -->
  <rect x="80" y="145" width="40" height="50" fill="#0078D4" stroke="#333333" stroke-width="1.5"/>

  <!-- Sweater vest (blue) over shirt -->
  <path d="M 70 135 L 70 210 Q 70 220 80 220 L 120 220 Q 130 220 130 210 L 130 135 Z" fill="#00A4EF" stroke="#333333" stroke-width="2.5"/>

  <!-- Vest opening (V-neck) -->
  <path d="M 85 140 L 100 165 L 115 140" fill="none" stroke="#333333" stroke-width="2"/>

  <!-- Vest buttons (Microsoft colors) -->
  <circle cx="100" cy="155" r="3.5" fill="#F25022" stroke="#333333" stroke-width="1"/>
  <circle cx="100" cy="175" r="3.5" fill="#7FBA00" stroke="#333333" stroke-width="1"/>
  <circle cx="100" cy="195" r="3.5" fill="#FFB900" stroke="#333333" stroke-width="1"/>

  <!-- Legs under robe -->
  <rect x="85" y="245" width="10" height="25" fill="#4D4D4D" stroke="#333333" stroke-width="2"/>
  <rect x="105" y="245" width="10" height="25" fill="#4D4D4D" stroke="#333333" stroke-width="2"/>

  <!-- Shoes -->
  <ellipse cx="90" cy="272" rx="7" ry="6" fill="#8B0000" stroke="#333333" stroke-width="1.5"/>
  <ellipse cx="110" cy="272" rx="7" ry="6" fill="#8B0000" stroke="#333333" stroke-width="1.5"/>

  <!-- Head: wizardly, old and kind -->
  <circle cx="100" cy="95" r="30" fill="#F4B183" stroke="#333333" stroke-width="2.5"/>

  <!-- Long flowing beard (white) -->
  <path d="M 75 110 Q 70 125 75 140 L 125 140 Q 130 125 125 110" fill="#FFFFFF" stroke="#333333" stroke-width="2"/>
  <!-- Beard details -->
  <path d="M 80 115 Q 75 125 80 135" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.6"/>
  <path d="M 100 115 Q 98 128 100 138" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.6"/>
  <path d="M 120 115 Q 125 125 120 135" fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.6"/>

  <!-- Hair (white, wild, old wizard) -->
  <circle cx="88" cy="75" r="12" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
  <circle cx="100" cy="65" r="14" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
  <circle cx="112" cy="75" r="12" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
  <circle cx="80" cy="85" r="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>
  <circle cx="120" cy="85" r="8" fill="#FFFFFF" stroke="#333333" stroke-width="1"/>

  <!-- Enormous round glasses (wizard style) -->
  <circle cx="80" cy="92" r="14" fill="#F0F0F0" stroke="#333333" stroke-width="2.5"/>
  <circle cx="120" cy="92" r="14" fill="#F0F0F0" stroke="#333333" stroke-width="2.5"/>

  <!-- Lens tint (blue) -->
  <circle cx="80" cy="92" r="12" fill="#E8F4FF" opacity="0.4" stroke="none"/>
  <circle cx="120" cy="92" r="12" fill="#E8F4FF" opacity="0.4" stroke="none"/>

  <!-- Eyes behind glasses (kind, gentle) -->
  <circle cx="78" cy="90" r="3" fill="#333333"/>
  <circle cx="122" cy="90" r="3" fill="#333333"/>
  <circle cx="79" cy="89" r="1" fill="#FFFFFF"/>
  <circle cx="123" cy="89" r="1" fill="#FFFFFF"/>

  <!-- Glasses bridge -->
  <rect x="94" y="90" width="12" height="4" rx="2" fill="#333333"/>

  <!-- Warm smile -->
  <path d="M 85 110 Q 100 118 115 110" fill="none" stroke="#333333" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left arm holding spellbook -->
  <path d="M 70 155 Q 45 165 40 190" fill="none" stroke="#F4B183" stroke-width="12" stroke-linecap="round"/>

  <!-- Spellbook: massive tome -->
  <rect x="28" y="185" width="24" height="50" rx="3" fill="#8B4513" stroke="#333333" stroke-width="2.5"/>
  <rect x="31" y="188" width="18" height="44" fill="#D2691E" stroke="#333333" stroke-width="1.5"/>

  <!-- Book title: "EXCEL" -->
  <text x="40" y="220" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFD700" font-family="serif">EXCEL</text>

  <!-- Pages detail -->
  <line x1="31" y1="197" x2="49" y2="197" stroke="#FFD700" stroke-width="1"/>
  <line x1="31" y1="206" x2="49" y2="206" stroke="#FFD700" stroke-width="1"/>
  <line x1="31" y1="215" x2="49" y2="215" stroke="#FFD700" stroke-width="1"/>
  <line x1="31" y1="224" x2="49" y2="224" stroke="#FFD700" stroke-width="1"/>

  <!-- Right arm (free) -->
  <path d="M 130 155 Q 155 165 160 190" fill="none" stroke="#F4B183" stroke-width="12" stroke-linecap="round"/>

  <!-- Hand on book side -->
  <circle cx="40" cy="210" r="6" fill="#F4B183" stroke="#333333" stroke-width="1.5"/>

  <!-- Right hand -->
  <circle cx="160" cy="195" r="6" fill="#F4B183" stroke="#333333" stroke-width="1.5"/>

  <!-- CLIPPY: the paperclip character on shoulder -->
  <g id="clippy">
    <!-- Main paperclip body (wireframe style) -->
    <!-- Large loop (left) -->
    <path d="M 110 145 Q 100 140 100 155 Q 100 165 110 165" fill="none" stroke="#FF9900" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Large loop (right) -->
    <path d="M 120 145 Q 130 140 130 155 Q 130 165 120 165" fill="none" stroke="#FF9900" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Connection point -->
    <rect x="108" y="160" width="4" height="8" fill="#FF9900" stroke="#333333" stroke-width="1"/>

    <!-- Googly eyes (left) -->
    <circle cx="105" cy="148" r="5" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
    <circle cx="105" cy="148" r="3" fill="#000000"/>
    <circle cx="106" cy="147" r="1" fill="#FFFFFF"/>

    <!-- Googly eyes (right) -->
    <circle cx="125" cy="148" r="5" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
    <circle cx="125" cy="148" r="3" fill="#000000"/>
    <circle cx="126" cy="147" r="1" fill="#FFFFFF"/>

    <!-- Cheerful expression -->
    <path d="M 108 156 Q 115 160 122 156" fill="none" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Decorative stars around Clippy (magic!) -->
  <text x="125" y="135" font-size="12">✨</text>
  <text x="135" y="150" font-size="10">✨</text>
  <text x="140" y="165" font-size="8">✨</text>
</svg>