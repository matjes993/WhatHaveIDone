<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="300" fill="#FFF5F5"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="270" rx="50" ry="12" fill="#00000015"/>

  <!-- Robes - flowing red -->
  <path d="M 70 140 Q 65 180 70 220 Q 80 250 100 260 Q 120 250 130 220 Q 135 180 130 140 Z" fill="#FF0000" stroke="#CC0000" stroke-width="2"/>

  <!-- Robe folds for depth -->
  <path d="M 78 160 Q 76 190 78 220" stroke="#CC0000" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 122 160 Q 124 190 122 220" stroke="#CC0000" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Tool icons woven into robes -->
  <!-- Paintbrush icon -->
  <g transform="translate(85, 170)">
    <line x1="0" y1="0" x2="0" y2="8" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="0" cy="-3" rx="3" ry="4" fill="#FFD700"/>
  </g>

  <!-- Pen icon -->
  <g transform="translate(115, 180)">
    <line x1="-2" y1="2" x2="2" y2="-2" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="2" cy="-2" r="1" fill="#FFD700"/>
  </g>

  <!-- Layers icon -->
  <g transform="translate(95, 200)">
    <rect x="-3" y="-2" width="6" height="3" fill="#FFD700" opacity="0.7"/>
    <rect x="-3" y="1" width="6" height="3" fill="#FFD700" opacity="0.85"/>
    <rect x="-3" y="4" width="6" height="3" fill="#FFD700"/>
  </g>

  <!-- Tool icons in folds -->
  <rect x="110" y="190" width="3" height="3" fill="#FFD700" opacity="0.6"/>
  <rect x="75" y="210" width="3" height="3" fill="#FFD700" opacity="0.6"/>

  <!-- Infinity symbol on chest -->
  <path d="M 88 150 Q 95 145 100 150 Q 105 155 100 160 Q 95 155 88 160 Q 81 155 88 150" fill="none" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>

  <!-- Neck -->
  <rect x="92" y="130" width="16" height="10" fill="#E8D5B7"/>

  <!-- Head -->
  <circle cx="100" cy="115" r="23" fill="#E8D5B7" stroke="#D9A975" stroke-width="1"/>

  <!-- Wizard hair/mystical aura -->
  <path d="M 77 105 Q 77 80 100 75 Q 123 80 123 105" fill="#4B3621" stroke="#2C2013" stroke-width="2"/>

  <!-- Mystical sparkles around head -->
  <circle cx="70" cy="95" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="130" cy="95" r="2" fill="#FFD700" opacity="0.8"/>
  <circle cx="75" cy="80" r="1.5" fill="#FFFF99" opacity="0.6"/>
  <circle cx="125" cy="80" r="1.5" fill="#FFFF99" opacity="0.6"/>

  <!-- Crown made of toolbar icons -->
  <g id="crown">
    <!-- Center icon -->
    <rect x="96" y="68" width="4" height="6" fill="#FFD700" stroke="#FF8C00" stroke-width="0.5"/>
    <!-- Left icon -->
    <rect x="85" y="72" width="3" height="5" fill="#FFD700" stroke="#FF8C00" stroke-width="0.5"/>
    <!-- Right icon -->
    <rect x="112" y="72" width="3" height="5" fill="#FFD700" stroke="#FF8C00" stroke-width="0.5"/>
    <!-- Far left -->
    <rect x="76" y="76" width="3" height="4" fill="#FFD700" stroke="#FF8C00" stroke-width="0.5" opacity="0.8"/>
    <!-- Far right -->
    <rect x="121" y="76" width="3" height="4" fill="#FFD700" stroke="#FF8C00" stroke-width="0.5" opacity="0.8"/>
    <!-- Crown glow -->
    <ellipse cx="100" cy="70" rx="28" ry="10" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Eyes - magical gaze -->
  <circle cx="90" cy="110" r="4" fill="#000000"/>
  <circle cx="110" cy="110" r="4" fill="#000000"/>
  <circle cx="91" cy="109" r="1.5" fill="#FFD700"/>
  <circle cx="111" cy="109" r="1.5" fill="#FFD700"/>

  <!-- Eyebrows - slightly sinister -->
  <path d="M 85 105 Q 90 102 95 105" stroke="#2C2013" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 105 Q 110 102 115 105" stroke="#2C2013" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <polygon points="100,113 98,118 102,118" fill="#D9A975"/>

  <!-- Gentle smile but slightly sinister -->
  <path d="M 92 122 Q 100 126 108 122" stroke="#8B6914" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 94 123 Q 100 125 106 123" fill="#FFB6C1" opacity="0.3"/>

  <!-- Hands with glowing creative energy -->
  <!-- Left hand -->
  <g id="left-hand" transform="translate(65, 160)">
    <ellipse cx="0" cy="0" rx="8" ry="10" fill="#E8D5B7"/>
    <!-- Fingers -->
    <circle cx="-4" cy="-8" r="2" fill="#E8D5B7"/>
    <circle cx="-2" cy="-9" r="2" fill="#E8D5B7"/>
    <circle cx="2" cy="-9" r="2" fill="#E8D5B7"/>
    <circle cx="4" cy="-8" r="2" fill="#E8D5B7"/>
    <!-- Glow sparkles -->
    <circle cx="-6" cy="-12" r="1.5" fill="#FFD700" opacity="0.9"/>
    <circle cx="-2" cy="-12" r="1" fill="#FFFF99" opacity="0.7"/>
    <circle cx="4" cy="-12" r="1.5" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- Right hand -->
  <g id="right-hand" transform="translate(135, 160)">
    <ellipse cx="0" cy="0" rx="8" ry="10" fill="#E8D5B7"/>
    <!-- Fingers -->
    <circle cx="-4" cy="-8" r="2" fill="#E8D5B7"/>
    <circle cx="-2" cy="-9" r="2" fill="#E8D5B7"/>
    <circle cx="2" cy="-9" r="2" fill="#E8D5B7"/>
    <circle cx="4" cy="-8" r="2" fill="#E8D5B7"/>
    <!-- Glow sparkles -->
    <circle cx="-6" cy="-12" r="1.5" fill="#FFD700" opacity="0.9"/>
    <circle cx="-2" cy="-12" r="1" fill="#FFFF99" opacity="0.7"/>
    <circle cx="4" cy="-12" r="1.5" fill="#FFD700" opacity="0.8"/>
  </g>

  <!-- Subscription infinity glow -->
  <circle cx="100" cy="115" r="28" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,2"/>

  <!-- Character name -->
  <text x="100" y="290" font-size="12" font-family="Arial, sans-serif" font-weight="bold" text-anchor="middle" fill="#FF0000">SORCERER</text>
</svg>