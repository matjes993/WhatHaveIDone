<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="300" fill="#f5f5f5"/>

  <!-- Head -->
  <circle cx="100" cy="80" r="35" fill="#e8d7c3" stroke="#000000" stroke-width="3"/>

  <!-- Aggressively gelled hair -->
  <path d="M 70 55 Q 65 30 100 20 Q 135 30 130 55 L 128 65 Q 100 75 72 65 Z" fill="#000000" stroke="#000000" stroke-width="2.5"/>

  <!-- Hair gel shine -->
  <ellipse cx="85" cy="40" rx="8" ry="6" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="115" cy="38" rx="8" ry="6" fill="#ffffff" opacity="0.6"/>
  <path d="M 90 30 L 95 15" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>

  <!-- Sunglasses (indoors) -->
  <!-- Left lens -->
  <rect x="68" y="75" width="18" height="14" fill="#1a1a1a" stroke="#000000" stroke-width="2" rx="3"/>
  <!-- Right lens -->
  <rect x="114" y="75" width="18" height="14" fill="#1a1a1a" stroke="#000000" stroke-width="2" rx="3"/>
  <!-- Bridge -->
  <rect x="86" y="80" width="8" height="4" fill="#000000" stroke="#000000" stroke-width="1"/>
  <!-- Reflection on lenses -->
  <ellipse cx="73" cy="78" rx="3" ry="2.5" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="119" cy="78" rx="3" ry="2.5" fill="#ffffff" opacity="0.7"/>

  <!-- Smug mouth -->
  <path d="M 90 100 Q 100 107 110 100" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 95 103 L 105 103" fill="none" stroke="#000000" stroke-width="1.5"/>

  <!-- Grey hoodie -->
  <path d="M 55 110 L 50 180 Q 50 210 70 225 L 130 225 Q 150 210 150 180 L 145 110 Z" fill="#4a4a4a" stroke="#000000" stroke-width="3"/>

  <!-- Hoodie drawstring -->
  <line x1="85" y1="120" x2="115" y2="120" stroke="#000000" stroke-width="2"/>
  <circle cx="85" cy="122" r="2" fill="#000000"/>
  <circle cx="115" cy="122" r="2" fill="#000000"/>

  <!-- Hoodie pocket -->
  <rect x="80" y="160" width="40" height="35" fill="#3a3a3a" stroke="#000000" stroke-width="2" rx="3"/>

  <!-- Left arm holding phone with surge pricing -->
  <ellipse cx="40" cy="150" rx="13" ry="42" fill="#e8d7c3" stroke="#000000" stroke-width="2.5" transform="rotate(-35 40 150)"/>

  <!-- Phone in left hand -->
  <rect x="15" y="110" width="24" height="40" fill="#000000" stroke="#000000" stroke-width="2" rx="2"/>
  <rect x="18" y="113" width="18" height="32" fill="#276EF1" stroke="#000000" stroke-width="1"/>

  <!-- Surge pricing arrow on phone screen -->
  <path d="M 25 140 L 25 120" fill="none" stroke="#FF0000" stroke-width="3" stroke-linecap="round"/>
  <polygon points="25,118 20,128 30,128" fill="#FF0000"/>

  <!-- Percentage signs on screen -->
  <text x="22" y="148" font-size="6" fill="#ffffff" text-anchor="middle">%</text>

  <!-- Right arm relaxed -->
  <ellipse cx="160" cy="160" rx="13" ry="38" fill="#e8d7c3" stroke="#000000" stroke-width="2.5" transform="rotate(25 160 160)"/>

  <!-- Hand on hip -->
  <circle cx="175" cy="150" r="10" fill="#e8d7c3" stroke="#000000" stroke-width="2"/>

  <!-- Expensive sneakers (visible) -->
  <rect x="85" y="215" width="16" height="20" fill="#ffffff" stroke="#000000" stroke-width="2" rx="2"/>
  <rect x="99" y="215" width="16" height="20" fill="#ffffff" stroke="#000000" stroke-width="2" rx="2"/>

  <!-- Sneaker stripes (Uber/Nike style) -->
  <line x1="87" y1="220" x2="99" y2="220" stroke="#276EF1" stroke-width="2"/>
  <line x1="101" y1="220" x2="113" y2="220" stroke="#276EF1" stroke-width="2"/>

  <!-- Floating 5-star ratings around him -->
  <g transform="translate(30, 70)">
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="#FFD700" stroke="#000000" stroke-width="1"/>
  </g>

  <g transform="translate(170, 85)">
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="#FFD700" stroke="#000000" stroke-width="1"/>
  </g>

  <g transform="translate(25, 200)">
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="#FFD700" stroke="#000000" stroke-width="1"/>
  </g>

  <g transform="translate(175, 210)">
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="#FFD700" stroke="#000000" stroke-width="1"/>
  </g>

  <!-- Rating number indicators -->
  <text x="30" y="95" font-size="10" font-weight="bold" fill="#FFD700">5</text>
  <text x="175" y="105" font-size="10" font-weight="bold" fill="#FFD700">5</text>
  <text x="20" y="225" font-size="10" font-weight="bold" fill="#FFD700">4.9</text>

  <!-- Uber green accent lines on hoodie -->
  <line x1="65" y1="140" x2="75" y2="140" stroke="#06C167" stroke-width="2"/>
  <line x1="125" y1="150" x2="135" y2="150" stroke="#06C167" stroke-width="2"/>
</svg>