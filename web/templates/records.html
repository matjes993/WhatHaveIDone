{% extends "base.html" %}
{% block title %}Loot Log{% endblock %}

{% block content %}
<div class="records">
    <header class="records__header">
        <div class="records__title-row">
            <h1 class="records__title jargon" data-rpg="Yer Plunder" data-real="Your Records">Yer Plunder</h1>
            <span class="records__total" id="records-total">{{ "{:,}".format(total_records) }} <span class="jargon" data-rpg="pieces of loot" data-real="records">pieces of loot</span></span>
        </div>

        <div class="records__controls">
            <div class="records__search-wrap">
                <svg class="records__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="records__search" id="records-search" placeholder="Search the seas, Captain..." autocomplete="off">
            </div>

            <select class="records__sort" id="records-sort">
                <option value="newest">Freshest plunder first</option>
                <option value="oldest">Oldest treasures first</option>
                <option value="relevance">Most prized booty</option>
            </select>
        </div>

        <div class="records__filters" id="records-filters">
            <button class="records__filter records__filter--active" data-source="" onclick="NomoloBridge.filterRecords(this)">
                All
            </button>
            {% for vault_name, count in vaults.items()|sort %}
            <button class="records__filter" data-source="{{ vault_name }}" onclick="NomoloBridge.filterRecords(this)">
                {{ vault_name.replace('_', ' ') }}
                <span class="records__filter-count">{{ "{:,}".format(count) }}</span>
            </button>
            {% endfor %}
        </div>
    </header>

    <div class="records__list" id="records-list">
        <div class="records__loading" id="records-loading">Unfurling the maps...</div>
    </div>

    <div class="records__pagination" id="records-pagination" style="display:none">
        <button class="records__page-btn" id="records-prev" onclick="NomoloBridge.recordsPage('prev')">&#8592; Sail back</button>
        <span class="records__page-info" id="records-page-info"></span>
        <button class="records__page-btn" id="records-next" onclick="NomoloBridge.recordsPage('next')">Sail on &#8594;</button>
    </div>

    <!-- Record Detail Modal -->
    <div class="record-detail" id="record-detail" style="display:none">
        <div class="record-detail__backdrop" onclick="NomoloBridge.closeRecordDetail()"></div>
        <div class="record-detail__content" id="record-detail-content">
        </div>
    </div>

    <div class="records__footer">
        <button class="records__open-folder" onclick="NomoloBridge.openVaultFolder()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            Open the treasure chest
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        NomoloBridge.initRecords();
    });
</script>
{% endblock %}
