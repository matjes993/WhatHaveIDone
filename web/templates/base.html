<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Nomolo — Your life. Your data. Your hard drive. Reclaim your digital history from cloud platforms.">
    <meta name="theme-color" content="#0a0a1a">
    <title>{% block title %}Nomolo{% endblock %} — Nomolo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Top Bar: Trust Badge + Jargon Toggle -->
    <div class="top-bar">
        <div class="trust-badge" title="All your data stays on this machine">
            <span class="trust-badge__icon">&#x1f512;</span>
            <span class="trust-badge__text jargon" data-rpg="LOCAL ONLY — yer data never leaves this ship" data-real="LOCAL ONLY — your data never leaves this machine">LOCAL ONLY — yer data never leaves this ship</span>
        </div>

        <!-- Jargon Mode Toggle -->
        <button class="jargon-toggle" id="jargon-toggle" onclick="NomoloBridge.toggleJargon()" title="Switch between Flatcloud Mode and Real World Mode">
            <span class="jargon-toggle__icon jargon-toggle__icon--rpg">&#x2694;&#xFE0F;</span>
            <span class="jargon-toggle__track">
                <span class="jargon-toggle__thumb"></span>
            </span>
            <span class="jargon-toggle__icon jargon-toggle__icon--real">&#x1F4C1;</span>
            <span class="jargon-toggle__label" id="jargon-label">I'm a Pirate</span>
        </button>
    </div>

    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar__top">
            <div class="sidebar__logo">
                <span class="sidebar__logo-icon">N</span>
                <span class="sidebar__logo-text">NOMOLO &#9875;</span>
            </div>
            <button class="sidebar__collapse-btn" onclick="NomoloBridge.toggleSidebar()" title="Toggle navigation">
                <span class="sidebar__collapse-icon">&#x00AB;</span>
            </button>
        </div>

        <ul class="sidebar__nav">
            <li>
                <a href="/" class="sidebar__link {% if page == 'dashboard' or not page %}sidebar__link--active{% endif %}">
                    <span class="sidebar__icon sidebar__icon--emoji">&#127866;</span>
                    <span class="sidebar__label jargon" data-rpg="SCUMM Bar" data-real="Dashboard">SCUMM Bar</span>
                </a>
            </li>
            <li>
                <a href="/automaton" class="sidebar__link {% if page == 'automaton' %}sidebar__link--active{% endif %}">
                    <span class="sidebar__icon sidebar__icon--emoji">&#x1F916;</span>
                    <span class="sidebar__label jargon" data-rpg="The Automaton" data-real="AI Chat">The Automaton</span>
                </a>
            </li>
            <li>
                <a href="/sources" class="sidebar__link {% if page == 'sources' %}sidebar__link--active{% endif %}">
                    <span class="sidebar__icon sidebar__icon--emoji">&#128506;&#65039;</span>
                    <span class="sidebar__label jargon" data-rpg="Life Map" data-real="Data Map">Life Map</span>
                </a>
            </li>
            <li>
                <a href="/aliases" class="sidebar__link {% if page == 'aliases' %}sidebar__link--active{% endif %}">
                    <span class="sidebar__icon sidebar__icon--emoji">&#127917;</span>
                    <span class="sidebar__label jargon" data-rpg="Many Faces" data-real="Identities">Many Faces</span>
                </a>
            </li>
            <li>
                <a href="/records" class="sidebar__link {% if page == 'records' %}sidebar__link--active{% endif %}">
                    <span class="sidebar__icon sidebar__icon--emoji">&#128220;</span>
                    <span class="sidebar__label jargon" data-rpg="Loot Log" data-real="Records">Loot Log</span>
                </a>
            </li>
            <li>
                <a href="/settings" class="sidebar__link {% if page == 'settings' %}sidebar__link--active{% endif %}">
                    <span class="sidebar__icon sidebar__icon--emoji">&#9881;&#65039;</span>
                    <span class="sidebar__label jargon" data-rpg="Ship's Helm" data-real="Settings">Ship's Helm</span>
                </a>
            </li>
        </ul>

        <div class="sidebar__footer">
            <div class="sidebar__proverb" id="pirate-proverb"></div>
            <div class="sidebar__version">v0.1.0</div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast container for notifications -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/app.js"></script>
    <script>
        // Initialize WebSocket connection and jargon toggle
        document.addEventListener('DOMContentLoaded', () => {
            NomoloBridge.init();
            NomoloBridge.initJargonToggle();

            // Rotating proverbs in sidebar footer — pirate or real
            const rpgProverbs = [
                "A smooth sea never made a skilled pirate.",
                "Take what ye can. Give nothing back.",
                "Not all treasure is silver and gold.",
                "The problem is not the problem. The problem is your attitude about the problem.",
                "Even the fiercest pirates started with a rowboat.",
                "Your data is worth more than Spanish doubloons.",
                "In a world of Merchant Lords, be the open-source pirate.",
                "He who controls the data controls the seas.",
                "The best time to reclaim yer data was yesterday. The second best is now.",
                "Behind every great pirate is a well-organized vault.",
            ];
            const realProverbs = [
                "Your data has real value. Own it.",
                "Privacy is not a feature. It's a right.",
                "The best backup is the one you control.",
                "Data sovereignty starts locally.",
                "Every record tells a story about you.",
                "Open source means you can verify the trust.",
                "Your digital footprint is yours to manage.",
                "Local-first: no servers, no surprises.",
                "The best time to take back your data was yesterday. The second best is now.",
                "Behind every organized person is a well-organized archive.",
            ];
            // Store proverbs globally so jargon toggle can refresh them
            window.__NOMOLO_PROVERBS__ = { rpg: rpgProverbs, real: realProverbs };
            const proverbEl = document.getElementById('pirate-proverb');
            if (proverbEl) {
                const jM = localStorage.getItem('nomolo_jargon_mode') || 'rpg';
                const pool = jM === 'rpg' ? rpgProverbs : realProverbs;
                proverbEl.textContent = pool[Math.floor(Math.random() * pool.length)];
                proverbEl.style.cssText = 'font-size: 10px; color: rgba(255,255,255,0.25); padding: 8px 12px; line-height: 1.4; font-style: italic;';
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
