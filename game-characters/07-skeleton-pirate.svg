<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Skeleton Pirate (Murray-inspired) -->
  <!-- Tattered coat -->
  <path d="M68 155 L60 240 L65 280 L75 278 L78 245 L122 245 L125 278 L135 280 L140 240 L132 155" fill="#3a3a50"/>
  <!-- Coat tears -->
  <path d="M60 260 L55 275 L62 270" fill="#3a3a50"/>
  <path d="M140 255 L148 272 L138 268" fill="#3a3a50"/>
  <!-- Rib cage visible through coat -->
  <line x1="85" y1="175" x2="115" y2="175" stroke="#d4d0c0" stroke-width="3" stroke-linecap="round"/>
  <line x1="83" y1="185" x2="117" y2="185" stroke="#d4d0c0" stroke-width="3" stroke-linecap="round"/>
  <line x1="85" y1="195" x2="115" y2="195" stroke="#d4d0c0" stroke-width="3" stroke-linecap="round"/>
  <line x1="87" y1="205" x2="113" y2="205" stroke="#d4d0c0" stroke-width="3" stroke-linecap="round"/>
  <!-- Spine -->
  <line x1="100" y1="160" x2="100" y2="230" stroke="#d4d0c0" stroke-width="4"/>
  <!-- Bone arms -->
  <line x1="68" y1="165" x2="40" y2="210" stroke="#d4d0c0" stroke-width="5" stroke-linecap="round"/>
  <line x1="40" y1="210" x2="35" y2="230" stroke="#d4d0c0" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="210" x2="30" y2="228" stroke="#d4d0c0" stroke-width="4" stroke-linecap="round"/>
  <line x1="132" y1="165" x2="160" y2="210" stroke="#d4d0c0" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="210" x2="165" y2="230" stroke="#d4d0c0" stroke-width="4" stroke-linecap="round"/>
  <line x1="160" y1="210" x2="170" y2="228" stroke="#d4d0c0" stroke-width="4" stroke-linecap="round"/>
  <!-- Bone legs -->
  <line x1="88" y1="245" x2="80" y2="285" stroke="#d4d0c0" stroke-width="5" stroke-linecap="round"/>
  <line x1="112" y1="245" x2="120" y2="285" stroke="#d4d0c0" stroke-width="5" stroke-linecap="round"/>
  <!-- Bone feet -->
  <ellipse cx="75" cy="288" rx="12" ry="5" fill="#d4d0c0"/>
  <ellipse cx="125" cy="288" rx="12" ry="5" fill="#d4d0c0"/>
  <!-- Skull -->
  <ellipse cx="100" cy="105" rx="35" ry="38" fill="#e8e4d4"/>
  <!-- Jaw -->
  <path d="M72 120 Q72 148 100 150 Q128 148 128 120" fill="#d4d0c0"/>
  <!-- Teeth -->
  <rect x="82" y="130" width="6" height="8" rx="1" fill="#e8e4d4" stroke="#a0a090" stroke-width="0.5"/>
  <rect x="90" y="130" width="6" height="8" rx="1" fill="#e8e4d4" stroke="#a0a090" stroke-width="0.5"/>
  <rect x="98" y="130" width="6" height="9" rx="1" fill="#e8e4d4" stroke="#a0a090" stroke-width="0.5"/>
  <rect x="106" y="130" width="6" height="8" rx="1" fill="#e8e4d4" stroke="#a0a090" stroke-width="0.5"/>
  <rect x="114" y="130" width="6" height="7" rx="1" fill="#e8e4d4" stroke="#a0a090" stroke-width="0.5"/>
  <!-- Missing tooth -->
  <rect x="90" y="130" width="6" height="8" rx="1" fill="#2a2a2a"/>
  <!-- Eye sockets -->
  <ellipse cx="85" cy="100" rx="12" ry="13" fill="#2a2a3a"/>
  <ellipse cx="115" cy="100" rx="12" ry="13" fill="#2a2a3a"/>
  <!-- Glowing eyes -->
  <circle cx="85" cy="102" r="5" fill="#58c8ff" opacity="0.8"/>
  <circle cx="115" cy="102" r="5" fill="#58c8ff" opacity="0.8"/>
  <circle cx="85" cy="101" r="2" fill="white" opacity="0.6"/>
  <circle cx="115" cy="101" r="2" fill="white" opacity="0.6"/>
  <!-- Nose hole -->
  <path d="M96 112 L100 118 L104 112" fill="#3a3a3a"/>
  <!-- Pirate hat -->
  <path d="M55 82 Q55 55 100 48 Q145 55 145 82 L135 88 Q100 72 65 88 Z" fill="#2a2a3a"/>
  <path d="M65 88 Q100 75 135 88" fill="none" stroke="#d4a843" stroke-width="2.5"/>
  <!-- Crossbones on hat -->
  <line x1="90" y1="62" x2="110" y2="76" stroke="#e8e4d4" stroke-width="3" stroke-linecap="round"/>
  <line x1="110" y1="62" x2="90" y2="76" stroke="#e8e4d4" stroke-width="3" stroke-linecap="round"/>
  <!-- Cutlass -->
  <path d="M165 225 Q175 210 170 190 Q168 180 172 178" fill="none" stroke="#b0b0b0" stroke-width="3" stroke-linecap="round"/>
  <rect x="158" y="226" width="15" height="6" rx="2" fill="#d4a843"/>
</svg>