<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="300" fill="#1A1A2E"/>

  <!-- Glowing aura -->
  <circle cx="100" cy="140" r="70" fill="#1877F2" opacity="0.15"/>
  <circle cx="100" cy="140" r="60" fill="#1877F2" opacity="0.1"/>

  <!-- Shadow -->
  <ellipse cx="100" cy="280" rx="50" ry="10" fill="#00000040"/>

  <!-- Floating thumbs-up icons -->
  <g id="thumbs1" opacity="0.6">
    <circle cx="30" cy="80" r="12" fill="#1877F2" stroke="#4A9FFF" stroke-width="1"/>
    <path d="M 30 88 L 30 95 L 27 95 L 27 88 Q 27 86 29 86 L 31 86 Q 33 86 33 88 L 33 95 L 30 95" fill="#4A9FFF"/>
    <text x="30" y="85" font-size="16" text-anchor="middle" fill="#FFFFFF" font-weight="bold">👍</text>
  </g>

  <g id="thumbs2" opacity="0.5">
    <circle cx="170" cy="120" r="12" fill="#1877F2" stroke="#4A9FFF" stroke-width="1"/>
    <text x="170" y="128" font-size="16" text-anchor="middle" fill="#FFFFFF" font-weight="bold">👍</text>
  </g>

  <g id="thumbs3" opacity="0.4">
    <circle cx="40" cy="180" r="12" fill="#1877F2" stroke="#4A9FFF" stroke-width="1"/>
    <text x="40" y="188" font-size="16" text-anchor="middle" fill="#FFFFFF" font-weight="bold">👍</text>
  </g>

  <!-- Body: t-shirt -->
  <ellipse cx="100" cy="180" rx="40" ry="55" fill="#808080" stroke="#333333" stroke-width="2"/>

  <!-- Jeans -->
  <rect x="80" y="225" width="18" height="45" fill="#2C3E50" stroke="#333333" stroke-width="2"/>
  <rect x="102" y="225" width="18" height="45" fill="#2C3E50" stroke="#333333" stroke-width="2"/>

  <!-- Head -->
  <circle cx="100" cy="110" r="28" fill="#F0E8D8" stroke="#333333" stroke-width="2.5"/>

  <!-- Perfectly symmetrical face - unnervingly so -->
  <!-- Left eye -->
  <circle cx="88" cy="105" r="5" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
  <circle cx="88" cy="105" r="3" fill="#333333"/>
  <circle cx="89" cy="104" r="1.5" fill="#FFFFFF"/>

  <!-- Right eye (mirror) -->
  <circle cx="112" cy="105" r="5" fill="#FFFFFF" stroke="#333333" stroke-width="1.5"/>
  <circle cx="112" cy="105" r="3" fill="#333333"/>
  <circle cx="111" cy="104" r="1.5" fill="#FFFFFF"/>

  <!-- Nose (centered, minimal) -->
  <line x1="100" y1="105" x2="100" y2="115" stroke="#333333" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mouth (thin, blank line) -->
  <line x1="92" y1="125" x2="108" y2="125" stroke="#333333" stroke-width="2" stroke-linecap="round"/>

  <!-- Hair: short curly dark -->
  <circle cx="90" cy="88" r="8" fill="#1A1A1A" stroke="#333333" stroke-width="1.5"/>
  <circle cx="100" cy="82" r="9" fill="#1A1A1A" stroke="#333333" stroke-width="1.5"/>
  <circle cx="110" cy="88" r="8" fill="#1A1A1A" stroke="#333333" stroke-width="1.5"/>
  <circle cx="95" cy="80" r="6" fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
  <circle cx="105" cy="80" r="6" fill="#1A1A1A" stroke="#333333" stroke-width="1"/>

  <!-- VR Headset on forehead -->
  <rect x="78" y="70" width="44" height="20" rx="8" fill="#1A1A1A" stroke="#333333" stroke-width="2"/>
  <circle cx="88" cy="75" r="6" fill="#4A9FFF" stroke="#333333" stroke-width="1.5"/>
  <circle cx="112" cy="75" r="6" fill="#4A9FFF" stroke="#333333" stroke-width="1.5"/>
  <rect x="95" y="72" width="10" height="6" fill="#1A1A1A" stroke="#333333" stroke-width="1"/>
  <circle cx="88" cy="75" r="3" fill="#1877F2" opacity="0.8"/>
  <circle cx="112" cy="75" r="3" fill="#1877F2" opacity="0.8"/>

  <!-- Shoes -->
  <ellipse cx="89" cy="270" rx="8" ry="6" fill="#2C3E50" stroke="#333333" stroke-width="1.5"/>
  <ellipse cx="111" cy="270" rx="8" ry="6" fill="#2C3E50" stroke="#333333" stroke-width="1.5"/>

  <!-- Arms at sides -->
  <rect x="62" y="160" width="14" height="50" rx="7" fill="#F0E8D8" stroke="#333333" stroke-width="2"/>
  <rect x="124" y="160" width="14" height="50" rx="7" fill="#F0E8D8" stroke="#333333" stroke-width="2"/>

  <!-- Hands -->
  <circle cx="69" cy="215" r="6" fill="#F0E8D8" stroke="#333333" stroke-width="1.5"/>
  <circle cx="131" cy="215" r="6" fill="#F0E8D8" stroke="#333333" stroke-width="1.5"/>
</svg>