<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10A37F;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0D7A66;stop-opacity:0.7" />
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- GIANT EYE hovering above - like a halo of judgment -->
  <g transform="translate(100, 25)">
    <!-- Eye white -->
    <circle cx="0" cy="0" r="22" fill="#FFF" stroke="#10A37F" stroke-width="2"/>
    <!-- Eye iris -->
    <circle cx="0" cy="2" r="13" fill="url(#eyeGlow)" stroke="#0D7A66" stroke-width="1.5"/>
    <!-- Eye pupil -->
    <circle cx="0" cy="2" r="7" fill="#000"/>
    <!-- Eye shine -->
    <circle cx="-3" cy="-1" r="2.5" fill="#FFF"/>
    <!-- Eyelid effect -->
    <path d="M -22 0 Q 0 -6 22 0" stroke="#10A37F" stroke-width="1.5" fill="none"/>
    <path d="M -22 0 Q 0 6 22 0" stroke="#10A37F" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Floating text fragments - mix of wisdom and gibberish -->
  <!-- Readable wisdom snippets -->
  <text x="20" y="80" font-family="Arial, sans-serif" font-size="7" fill="#10A37F" filter="url(#textGlow)" opacity="0.8">
    <tspan>"The answer is</tspan>
    <tspan x="20" dy="8">always within"</tspan>
  </text>

  <text x="140" y="100" font-family="Arial, sans-serif" font-size="6" fill="#10A37F" filter="url(#textGlow)" opacity="0.75">
    <tspan>"Remember to</tspan>
    <tspan x="140" dy="7">breathe deeply"</tspan>
  </text>

  <!-- Pure nonsense/gibberish - equally confident -->
  <text x="25" y="180" font-family="Arial, sans-serif" font-size="7" fill="#10A37F" filter="url(#textGlow)" opacity="0.75">
    <tspan>"Blarglefwoop</tspan>
    <tspan x="25" dy="8">gleep zorp!"</tspan>
  </text>

  <text x="135" y="160" font-family="Arial, sans-serif" font-size="6" fill="#10A37F" filter="url(#textGlow)" opacity="0.7">
    <tspan>"Floob squirm</tspan>
    <tspan x="135" dy="7">nitz zazzle"</tspan>
  </text>

  <text x="50" y="240" font-family="Arial, sans-serif" font-size="6" fill="#10A37F" filter="url(#textGlow)" opacity="0.8">
    <tspan>"7 purple bananas</tspan>
    <tspan x="50" dy="7">swim backwards"</tspan>
  </text>

  <!-- Head -->
  <circle cx="100" cy="115" r="26" fill="#F5DEB3" stroke="#D2B48C" stroke-width="2"/>

  <!-- Friendly, humble hair - simple style -->
  <path d="M 74 95 Q 74 80 100 75 Q 126 80 126 95" fill="#8B7355" stroke="#654321" stroke-width="1.5"/>

  <!-- Bright earnest eyes -->
  <circle cx="88" cy="110" r="4" fill="#000"/>
  <circle cx="112" cy="110" r="4" fill="#000"/>
  <!-- Eye shine - eager, sincere -->
  <circle cx="89" cy="108" r="1.5" fill="#FFF"/>
  <circle cx="113" cy="108" r="1.5" fill="#FFF"/>

  <!-- Slight smile - friendly -->
  <path d="M 93 118 Q 100 121 107 118" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Simple grey sweater - humble appearance -->
  <ellipse cx="100" cy="145" rx="38" ry="48" fill="#A9A9A9" stroke="#808080" stroke-width="2"/>

  <!-- Sweater neckline -->
  <ellipse cx="100" cy="110" rx="20" ry="12" fill="#808080" stroke="#666" stroke-width="1.5"/>

  <!-- Sweater cuff details -->
  <rect x="68" y="155" width="10" height="8" fill="#909090" stroke="#707070" stroke-width="1" rx="2"/>
  <rect x="122" y="155" width="10" height="8" fill="#909090" stroke="#707070" stroke-width="1" rx="2"/>

  <!-- Left arm - gesturing enthusiastically -->
  <ellipse cx="55" cy="135" rx="11" ry="40" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>
  <!-- Hand waving -->
  <g transform="translate(50, 95)">
    <ellipse rx="12" ry="16" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>
    <!-- Fingers -->
    <line x1="-6" y1="-10" x2="-8" y2="-18" stroke="#D2B48C" stroke-width="1"/>
    <line x1="-2" y1="-12" x2="-2" y2="-20" stroke="#D2B48C" stroke-width="1"/>
    <line x1="2" y1="-12" x2="2" y2="-20" stroke="#D2B48C" stroke-width="1"/>
    <line x1="6" y1="-10" x2="8" y2="-18" stroke="#D2B48C" stroke-width="1"/>
    <!-- Gesture lines -->
    <path d="M -10 -15 Q -15 -18 -18 -20" stroke="#10A37F" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Right arm - gesturing enthusiastically -->
  <ellipse cx="145" cy="135" rx="11" ry="40" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>
  <!-- Hand waving -->
  <g transform="translate(150, 95)">
    <ellipse rx="12" ry="16" fill="#F5DEB3" stroke="#D2B48C" stroke-width="1.5"/>
    <!-- Fingers -->
    <line x1="-6" y1="-10" x2="-8" y2="-18" stroke="#D2B48C" stroke-width="1"/>
    <line x1="-2" y1="-12" x2="-2" y2="-20" stroke="#D2B48C" stroke-width="1"/>
    <line x1="2" y1="-12" x2="2" y2="-20" stroke="#D2B48C" stroke-width="1"/>
    <line x1="6" y1="-10" x2="8" y2="-18" stroke="#D2B48C" stroke-width="1"/>
    <!-- Gesture lines -->
    <path d="M 10 -15 Q 15 -18 18 -20" stroke="#10A37F" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Simple pants -->
  <rect x="84" y="185" width="14" height="36" fill="#5A5A5A" stroke="#444" stroke-width="1.5"/>
  <rect x="102" y="185" width="14" height="36" fill="#5A5A5A" stroke="#444" stroke-width="1.5"/>

  <!-- Simple shoes -->
  <ellipse cx="91" cy="225" rx="9" ry="7" fill="#333" stroke="#000" stroke-width="1"/>
  <ellipse cx="109" cy="225" rx="9" ry="7" fill="#333" stroke="#000" stroke-width="1"/>

  <!-- Sheen on giant eye suggesting it's always watching -->
  <ellipse cx="95" cy="15" rx="5" ry="8" fill="#FFF" opacity="0.4"/>
</svg>