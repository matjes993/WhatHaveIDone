<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Voodoo Priestess -->
  <!-- Dress -->
  <path d="M70 165 L55 285 Q55 290 60 290 L140 290 Q145 290 145 285 L130 165" fill="#6b1a6b"/>
  <!-- Dress pattern -->
  <circle cx="80" cy="210" r="4" fill="#9a3a9a" opacity="0.6"/>
  <circle cx="110" cy="230" r="4" fill="#9a3a9a" opacity="0.6"/>
  <circle cx="90" cy="255" r="4" fill="#9a3a9a" opacity="0.6"/>
  <circle cx="120" cy="200" r="4" fill="#9a3a9a" opacity="0.6"/>
  <!-- Star patterns -->
  <text x="75" y="245" font-size="12" fill="#d4a843" opacity="0.5">✦</text>
  <text x="115" y="260" font-size="12" fill="#d4a843" opacity="0.5">✦</text>
  <!-- Necklace area -->
  <path d="M78 165 Q100 180 122 165" fill="none" stroke="#d4a843" stroke-width="2"/>
  <circle cx="100" cy="178" r="6" fill="#d4a843"/>
  <circle cx="88" cy="174" r="3" fill="#e8585a"/>
  <circle cx="112" cy="174" r="3" fill="#e8585a"/>
  <!-- Arms -->
  <path d="M55 170 L40 210 Q38 218 42 220 L48 218 L58 185" fill="#8b5e3c"/>
  <path d="M145 170 L160 210 Q162 218 158 220 L152 218 L142 185" fill="#8b5e3c"/>
