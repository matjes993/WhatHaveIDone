<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="200" height="300" fill="#1a1a1a"/>

  <!-- Head -->
  <circle cx="100" cy="80" r="32" fill="#e8d7c3" stroke="#000000" stroke-width="3"/>

  <!-- Director's beret -->
  <ellipse cx="100" cy="48" rx="38" ry="20" fill="#1a1a1a" stroke="#000000" stroke-width="3"/>
  <circle cx="100" cy="50" r="8" fill="#1a1a1a" stroke="#000000" stroke-width="2"/>

  <!-- Beret pompom -->
  <circle cx="100" cy="45" r="4" fill="#E50914" stroke="#000000" stroke-width="1.5"/>

  <!-- Red scarf -->
  <path d="M 70 85 Q 65 95 70 110" fill="#E50914" stroke="#E50914" stroke-width="6" stroke-linecap="round"/>
  <path d="M 130 85 Q 135 95 130 110" fill="#E50914" stroke="#E50914" stroke-width="6" stroke-linecap="round"/>

  <!-- Scarf fabric detail -->
  <line x1="68" y1="90" x2="72" y2="92" stroke="#000000" stroke-width="1" opacity="0.5"/>
  <line x1="132" y1="90" x2="128" y2="92" stroke="#000000" stroke-width="1" opacity="0.5"/>

  <!-- Dramatic expression - one eyebrow raised -->
  <!-- Left eye normal -->
  <circle cx="88" cy="75" r="4" fill="#000000"/>
  <circle cx="88.5" cy="73" r="1.5" fill="#ffffff"/>

  <!-- Right eye with raised eyebrow -->
  <circle cx="112" cy="75" r="4" fill="#000000"/>
  <circle cx="112.5" cy="73" r="1.5" fill="#ffffff"/>

  <!-- Eyebrows -->
  <path d="M 80 68 Q 88 63 96 68" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round"/>
  <path d="M 104 64 Q 112 59 120 67" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Dramatic mouth -->
  <path d="M 90 90 Q 100 98 110 90" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Body - dark dramatic outfit -->
  <path d="M 65 110 L 60 220 Q 60 240 75 250 L 125 250 Q 140 240 140 220 L 135 110 Z" fill="#2a2a2a" stroke="#000000" stroke-width="3"/>

  <!-- Chest/torso detail -->
  <rect x="70" y="115" width="60" height="90" fill="#1a1a1a" stroke="#000000" stroke-width="2" rx="3"/>

  <!-- Left arm holding clapperboard -->
  <ellipse cx="45" cy="145" rx="12" ry="38" fill="#e8d7c3" stroke="#000000" stroke-width="2.5" transform="rotate(-30 45 145)"/>

  <!-- Left hand holding clapperboard -->
  <circle cx="28" cy="110" r="10" fill="#e8d7c3" stroke="#000000" stroke-width="2"/>

  <!-- Clapperboard (film clapper) -->
  <g transform="translate(15, 95)">
    <!-- White board -->
    <rect x="0" y="0" width="35" height="25" fill="#ffffff" stroke="#000000" stroke-width="2" rx="2"/>

    <!-- Black/red stripes -->
    <rect x="0" y="0" width="35" height="4" fill="#000000"/>
    <rect x="0" y="4" width="35" height="4" fill="#E50914"/>
    <rect x="0" y="8" width="35" height="4" fill="#000000"/>

    <!-- Clapperboard text -->
    <text x="17.5" y="20" font-size="6" font-weight="bold" fill="#000000" text-anchor="middle">SCENE</text>

    <!-- Stick handle -->
    <rect x="14" y="22" width="7" height="12" fill="#8B4513" stroke="#000000" stroke-width="1" rx="1"/>
  </g>

  <!-- Right arm holding giant red stamp -->
  <ellipse cx="155" cy="145" rx="12" ry="38" fill="#e8d7c3" stroke="#000000" stroke-width="2.5" transform="rotate(30 155 145)"/>

  <!-- Right hand holding stamp -->
  <circle cx="172" cy="110" r="10" fill="#e8d7c3" stroke="#000000" stroke-width="2"/>

  <!-- GIANT red rubber stamp that says "CANCEL" -->
  <g transform="translate(160, 85)">
    <!-- Stamp handle (wooden) -->
    <rect x="-8" y="0" width="16" height="25" fill="#8B4513" stroke="#000000" stroke-width="2" rx="3"/>

    <!-- Stamp rubber part -->
    <rect x="-28" y="20" width="56" height="35" fill="#E50914" stroke="#000000" stroke-width="3" rx="4"/>

    <!-- Text on stamp -->
    <text x="0" y="45" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle" transform="rotate(-15)">CANCEL</text>

    <!-- Impact lines around stamp (dramatic) -->
    <line x1="-45" y1="15" x2="-35" y2="5" stroke="#E50914" stroke-width="2" opacity="0.7"/>
    <line x1="45" y1="15" x2="35" y2="5" stroke="#E50914" stroke-width="2" opacity="0.7"/>
    <line x1="-40" y1="65" x2="-30" y2="75" stroke="#E50914" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Legs in dramatic pose -->
  <rect x="80" y="230" width="14" height="60" fill="#000000" stroke="#000000" stroke-width="2" transform="rotate(-10 87 230)"/>
  <rect x="106" y="235" width="14" height="60" fill="#000000" stroke="#000000" stroke-width="2" transform="rotate(10 113 235)"/>

  <!-- Shoes -->
  <ellipse cx="83" cy="290" rx="12" ry="10" fill="#2a2a2a" stroke="#000000" stroke-width="2"/>
  <ellipse cx="117" cy="295" rx="12" ry="10" fill="#2a2a2a" stroke="#000000" stroke-width="2"/>

  <!-- Film strip elements around character -->
  <g transform="translate(20, 180)">
    <!-- Film strip -->
    <rect x="0" y="0" width="10" height="40" fill="#000000" stroke="#000000" stroke-width="1"/>
    <circle cx="2.5" cy="5" r="1.5" fill="#ffffff"/>
    <circle cx="7.5" cy="5" r="1.5" fill="#ffffff"/>
    <circle cx="2.5" cy="15" r="1.5" fill="#ffffff"/>
    <circle cx="7.5" cy="15" r="1.5" fill="#ffffff"/>
    <circle cx="2.5" cy="25" r="1.5" fill="#ffffff"/>
    <circle cx="7.5" cy="25" r="1.5" fill="#ffffff"/>
    <circle cx="2.5" cy="35" r="1.5" fill="#ffffff"/>
    <circle cx="7.5" cy="35" r="1.5" fill="#ffffff"/>
  </g>

  <g transform="translate(170, 200)">
    <!-- Film strip -->
    <rect x="0" y="0" width="10" height="40" fill="#000000" stroke="#000000" stroke-width="1"/>
    <circle cx="2.5" cy="5" r="1.5" fill="#E50914"/>
    <circle cx="7.5" cy="5" r="1.5" fill="#E50914"/>
    <circle cx="2.5" cy="15" r="1.5" fill="#E50914"/>
    <circle cx="7.5" cy="15" r="1.5" fill="#E50914"/>
    <circle cx="2.5" cy="25" r="1.5" fill="#E50914"/>
    <circle cx="7.5" cy="25" r="1.5" fill="#E50914"/>
    <circle cx="2.5" cy="35" r="1.5" fill="#E50914"/>
    <circle cx="7.5" cy="35" r="1.5" fill="#E50914"/>
  </g>

  <!-- Netflix red accent glow around character -->
  <ellipse cx="100" cy="140" rx="75" ry="85" fill="none" stroke="#E50914" stroke-width="2" opacity="0.3"/>
</svg>