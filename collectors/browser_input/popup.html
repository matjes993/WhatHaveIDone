<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nomolo Text Capture</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #ffffff;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #e2e8f0;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #0f172a;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #cbd5e1;
      border-radius: 20px;
      transition: background 0.2s;
    }

    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #22c55e;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }

    .stats {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #e2e8f0;
    }

    .stats .count {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
    }

    .stats .label {
      font-size: 12px;
      color: #64748b;
    }

    .actions {
      padding: 10px 16px 14px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 6px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .btn:last-child {
      margin-bottom: 0;
    }

    .btn.paused {
      background: #fef3c7;
      border-color: #fbbf24;
      color: #92400e;
    }

    .status-line {
      padding: 8px 16px;
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      border-top: 1px solid #e2e8f0;
    }

    .status-line.active {
      color: #22c55e;
    }

    .status-line.paused {
      color: #f59e0b;
    }

    .status-line.off {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Nomolo Capture</h1>
    <div class="toggle-container">
      <span class="toggle-label" id="toggle-label">ON</span>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="stats">
    <span class="count" id="capture-count">0</span>
    <span class="label">captures this session</span>
  </div>

  <div class="actions">
    <button class="btn" id="pause-site-btn">Pause for this site</button>
  </div>

  <div class="status-line active" id="status-line">
    Capturing text input
  </div>

  <script src="popup.js"></script>
</body>
</html>
